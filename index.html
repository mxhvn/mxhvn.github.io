<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>MXHVN • Đang điều hướng…</title>

  <meta http-equiv="x-dns-prefetch-control" content="on">
  <link rel="dns-prefetch" href="//mxhvn.github.io">
  <link rel="preconnect" href="https://mxhvn.github.io" crossorigin>
  <link rel="prefetch" href="/vn/" as="document">

  <style>
    :root{
      --bg:#0b1220;
      --card:rgba(255,255,255,.06);
      --stroke:rgba(255,255,255,.10);
      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.68);
      --primary:#4f46e5;
      --shadow: 0 24px 70px rgba(0,0,0,.45);
      --radius: 18px;
    }
    @media (prefers-color-scheme: light){
      :root{
        --bg:#f6f7fb;
        --card:rgba(0,0,0,.04);
        --stroke:rgba(0,0,0,.08);
        --text:rgba(0,0,0,.88);
        --muted:rgba(0,0,0,.58);
        --shadow: 0 18px 60px rgba(0,0,0,.12);
      }
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background:
        radial-gradient(900px 600px at 20% 10%, rgba(79,70,229,.18), transparent 55%),
        radial-gradient(900px 600px at 90% 30%, rgba(59,130,246,.12), transparent 60%),
        var(--bg);
      color:var(--text);
      display:grid;
      place-items:center;
      padding:18px;
    }
    .card{
      width:min(520px, 100%);
      border:1px solid var(--stroke);
      background:linear-gradient(180deg, var(--card), transparent 160%);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .header{
      padding:18px 18px 10px 18px;
      display:flex;
      align-items:center;
      gap:12px;
    }
    .mark{
      width:40px;height:40px;border-radius:14px;
      background: linear-gradient(135deg, rgba(79,70,229,.95), rgba(59,130,246,.85));
      box-shadow: 0 16px 40px rgba(79,70,229,.25);
      position:relative;
    }
    .mark:after{
      content:"";
      position:absolute; inset:1px;
      border-radius:13px;
      background: rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
    }
    @media (prefers-color-scheme: light){
      .mark:after{ background: rgba(255,255,255,.45); border-color: rgba(0,0,0,.06); }
    }
    h1{
      margin:0;
      font-size:16px;
      letter-spacing:.2px;
    }
    .sub{
      margin:4px 0 0 0;
      font-size:13px;
      color:var(--muted);
      line-height:1.35;
    }
    .body{
      padding: 10px 18px 18px 18px;
    }

    .info{
      border:1px solid var(--stroke);
      background: rgba(255,255,255,.04);
      border-radius: 14px;
      padding: 12px;
    }
    @media (prefers-color-scheme: light){
      .info{ background: rgba(0,0,0,.02); }
    }
    .row{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      font-size:13px;
      color:var(--muted);
      margin: 6px 0;
    }
    .val{
      color:var(--text);
      font-weight:600;
      word-break:break-all;
      text-align:right;
    }
    .progress{
      margin-top: 14px;
      height: 10px;
      border-radius:999px;
      border:1px solid var(--stroke);
      background: rgba(255,255,255,.05);
      overflow:hidden;
    }
    .bar{
      height:100%;
      width:0%;
      border-radius:999px;
      background: linear-gradient(90deg, rgba(79,70,229,.95), rgba(59,130,246,.90));
      transition: width .2s ease;
    }
    .actions{
      display:flex;
      gap:10px;
      margin-top: 14px;
    }
    button{
      width:100%;
      appearance:none;
      border:1px solid var(--stroke);
      border-radius:14px;
      padding: 11px 12px;
      font-weight:700;
      font-size:13px;
      cursor:pointer;
      background: rgba(255,255,255,.04);
      color: var(--text);
      transition: transform .08s ease, background .2s ease, border-color .2s ease;
    }
    button:active{ transform: translateY(1px); }
    .primary{
      background: linear-gradient(135deg, rgba(79,70,229,.24), rgba(59,130,246,.16));
      border-color: rgba(79,70,229,.35);
    }
    .muted{
      background: rgba(255,255,255,.02);
    }

    .foot{
      padding: 0 18px 16px 18px;
      font-size:12px;
      color: var(--muted);
      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }
  </style>
</head>
<body>
  <div class="card" role="application" aria-label="Redirect screen">
    <div class="header">
      <div class="mark" aria-hidden="true"></div>
      <div>
        <h1>Đang điều hướng sang trang dịch vụ…</h1>
        <p class="sub">Vui lòng không tắt trình duyệt trong quá trình chuyển trang.</p>
      </div>
    </div>

    <div class="body">
      <div class="info" aria-label="Redirect info">
        <div class="row"><span>Điểm đến</span><span class="val" id="dest">/vn/</span></div>
        <div class="row"><span>Tự động sau</span><span class="val"><span id="sec">2</span>s</span></div>
      </div>

      <div class="progress" aria-label="Progress">
        <div class="bar" id="bar"></div>
      </div>

      <div class="actions">
        <button class="primary" id="go">Đi ngay</button>
        <button class="muted" id="cancel">Hủy</button>
      </div>
    </div>

    <div class="foot">
      <div>MXHVN</div>
      <div id="ts"></div>
    </div>
  </div>

<script>
(() => {
  const DEFAULT = "/vn/";
  const url = new URL(location.href);

  // Deep-link preserve: /abc?x#y -> /vn/abc?x#y (but / -> /vn/)
  const path = (url.pathname === "/" ? "" : url.pathname);
  const resolved = DEFAULT.replace(/\/+$/,"/") + path.replace(/^\/+/,"") + url.search + url.hash;

  const destEl = document.getElementById("dest");
  const secEl = document.getElementById("sec");
  const bar = document.getElementById("bar");
  const ts = document.getElementById("ts");
  const btnGo = document.getElementById("go");
  const btnCancel = document.getElementById("cancel");

  destEl.textContent = resolved;

  // Footer timestamp (banking-like)
  try { ts.textContent = new Date().toLocaleString("vi-VN"); } catch(e){ ts.textContent = ""; }

  let total = 2000; // ms
  let start = performance.now();
  let cancelled = false;

  const go = () => {
    // replace keeps history clean (professional)
    location.replace(resolved);
  };

  btnGo.addEventListener("click", () => { cancelled = true; go(); });
  btnCancel.addEventListener("click", () => { cancelled = true; secEl.textContent = "—"; bar.style.width = "0%"; });

  const tick = (now) => {
    if (cancelled) return;
    const elapsed = now - start;
    const left = Math.max(0, total - elapsed);
    const p = Math.min(1, elapsed / total);

    bar.style.width = (p * 100).toFixed(0) + "%";
    secEl.textContent = Math.ceil(left / 1000);

    if (left <= 0) return go();
    requestAnimationFrame(tick);
  };

  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
